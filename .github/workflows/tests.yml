name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:  # allow other workflows (e.g. publish) to gate on this

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system libraries (snappy)
        run: sudo apt-get update && sudo apt-get install -y libsnappy-dev

      - name: Install package with all extras and test tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[all,tables,test]'

      - name: Run tests
        run: pytest -q
